name: Build Sultan + KernelSU-Next + SuSFS + NoMount

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  ANYKERNEL_REPO: https://github.com/TheWildJames/AnyKernel3.git
  PATCHES_REPO: https://github.com/TheWildJames/kernel_patches.git
  SCRIPTS_REPO: https://github.com/TheSillyOk/sh
  KSU_REPO: KernelSU-Next/KernelSU-Next
  KSU_BRANCH: dev
  KSU_COMMIT: 2887ea49428bc3fb5184e7c35223f0a9a47ad100
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: gki-android14-6.1
  SUSFS_COMMIT: e1c57040136760a57969fc6b1378cc936a257561
  GCC_VERSION: "14.2.rel1"

jobs:
  build:
    name: Build zumapro Kernel
    runs-on: ubuntu-latest
    outputs:
      ksu_ver: ${{ steps.meta.outputs.ksu_ver }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install ARM GNU Toolchain
        run: |
          BASE_URL="https://developer.arm.com/-/media/Files/downloads/gnu/${{ env.GCC_VERSION }}/binrel/"
          ARCHIVE64="arm-gnu-toolchain-${{ env.GCC_VERSION }}-x86_64-aarch64-none-linux-gnu.tar.xz"
          ARCHIVE32="arm-gnu-toolchain-${{ env.GCC_VERSION }}-x86_64-arm-none-linux-gnueabihf.tar.xz"
          
          mkdir -p "${{ github.workspace }}/toolchains/arm64" "${{ github.workspace }}/toolchains/arm32"
          
          wget -q "${BASE_URL}/${ARCHIVE64}" -O /tmp/arm64.tar.xz
          wget -q "${BASE_URL}/${ARCHIVE32}" -O /tmp/arm32.tar.xz
          
          tar -xf /tmp/arm64.tar.xz -C "${{ github.workspace }}/toolchains/arm64" --strip-components=1
          tar -xf /tmp/arm32.tar.xz -C "${{ github.workspace }}/toolchains/arm32" --strip-components=1
          
          echo "ARM64_TOOLCHAIN=${{ github.workspace }}/toolchains/arm64/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV
          echo "ARM32_TOOLCHAIN=${{ github.workspace }}/toolchains/arm32/bin/arm-none-linux-gnueabihf-" >> $GITHUB_ENV
          echo "CC=${{ github.workspace }}/toolchains/arm64/bin/aarch64-none-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth=1 https://github.com/ZQZCC/android_kernel_google_tensynos -b 16.0.0-sultan sultan
          git clone --depth=1 "${{ env.ANYKERNEL_REPO }}" -b sultan-zumapro AK3
          git clone --depth=1 "${{ env.PATCHES_REPO }}" kernel_patches
          git clone --depth=1 "${{ env.SCRIPTS_REPO }}" sh
          git clone "${{ env.SUSFS_REPO }}" -b "${{ env.SUSFS_BRANCH }}" susfs4ksu
          cd susfs4ksu
          git checkout "${{ env.SUSFS_COMMIT }}"

      - name: Metadata
        id: meta
        run: |
          K_VER=$(./sh/get_ksuver.sh "KernelSU-Next" "KernelSU-Next" "${{ env.KSU_BRANCH }}" || echo "unknown")
          echo "ksu_ver=$K_VER" >> "$GITHUB_OUTPUT"

      - name: KSU & SuSFS Setup
        working-directory: sultan
        run: |
          # Add KernelSU-Next
          curl -LSs "https://raw.githubusercontent.com/${{ env.KSU_REPO }}/${{ env.KSU_BRANCH }}/kernel/setup.sh" | bash -s "${{ env.KSU_COMMIT }}"
          
          # Apply Sultan patches
          patch -p1 < ../kernel_patches/sultan/60_scripts_mkcompile_h.patch || true
          patch -p1 < ../kernel_patches/sultan/61_scripts_setlocalversion.patch || true
          patch -p1 < ../kernel_patches/sultan/62_init_Makefile.patch || true
          
          #NoMount Patches
          
          
          # SuSFS core files
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ./
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          
          # Fix open.c for Sultan
          perl -0pi -e 's/if \(IS_ERR\(f\) && !libperfmgr_redirect\(&f, dfd, tmp, &op, how\)\) \{/if (IS_ERR(f)) {/g' fs/open.c
          patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true
          perl -0pi -e 's/if \(IS_ERR\(f\)\) \{/if (IS_ERR(f) && !libperfmgr_redirect(&f, dfd, tmp, &op, how)) {/g' fs/open.c
          
          # SuSFS sys.c fix
          cp ../kernel_patches/sultan/sys.c_fix.patch ./
          patch -p1 < sys.c_fix.patch || true
          
          # Pure manual hooks
          cp ../kernel_patches/wild/hooks/69_pure_manual_hooks_only.patch ./
          patch -p1 < 69_pure_manual_hooks_only.patch || true
          
          # KernelSU-Next SuSFS patch
          cd KernelSU-Next
          cp ${{ github.workspace }}/kernel_patches/wild/ksun-e6ba52b-susfs-v2.1.0-a14-6.1-e1c57040.patch ./
          patch -p1 < ksun-e6ba52b-susfs-v2.1.0-a14-6.1-e1c57040.patch || true
          
      - name: NoMount & Patches
        working-directory: sultan
        run: |
          curl -LSs "https://raw.githubusercontent.com/maxsteeel/nomount/refs/heads/master/kernel/src/nomount.c" -o ./fs/nomount.c
          curl -LSs "https://raw.githubusercontent.com/maxsteeel/nomount/refs/heads/master/kernel/src/nomount.h" -o ./fs/nomount.h
          curl -LSs "https://raw.githubusercontent.com/maxsteeel/nomount/refs/heads/master/kernel/nomount_kernel_integration.patch" -o nomount.patch
          patch -p1 --fuzz=3 < nomount.patch
          

      - name: Inject Configuration
        working-directory: sultan
        env:
          CROSS_COMPILE: ${{ env.ARM64_TOOLCHAIN }}
          CC: ${{ env.CC }}
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" zumapro_defconfig
          
          cat >> out/.config <<EOF
          # --- Core System & FS ---
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=21
          CONFIG_LOCALVERSION_AUTO=n
          CONFIG_LOCALVERSION="-Sultan-KSU"
          
          # --- KernelSU & SuSFS ---
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          
          # --- Advanced Networking ---
          CONFIG_NOMOUNT=y
          
          # --- Advanced Networking ---
          CONFIG_NETFILTER_ADVANCED=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_MULTIPLE_TABLES=y
          CONFIG_IPV6_MULTIPLE_TABLES=y
          
          # --- IPSet ---
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          
          # --- BBR ---
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_DEFAULT_BBR=y
          
          # --- XFRM / VPN ---
          CONFIG_XFRM_ALGO=y
          CONFIG_INET_IPCOMP=y
          CONFIG_INET_XFRM_TUNNEL=y
          CONFIG_INET_ESP=y
          CONFIG_XFRM_USER=y
          CONFIG_XFRM_SUB_POLICY=y
          CONFIG_INET_XFRM_MODE_TUNNEL=y
          CONFIG_XFRM_STATISTICS=y
          
          # --- Cgroups ---
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_BPF=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_INOTIFY_USER=y
          EOF
          
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" olddefconfig

      - name: Build Kernel
        working-directory: sultan
        env:
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
          CROSS_COMPILE: ${{ env.ARM64_TOOLCHAIN }}
          CC: ${{ env.CC }}
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Package
        run: |
          cp sultan/out/arch/arm64/boot/Image.lz4 AK3/Image.lz4
          cat sultan/out/google-devices/zumapro/dts/*.dtb > AK3/dtb
          ZIP_NAME="Sultan-zumapro-$(date +'%Y%m%d')-KSU-Next-SuSFS-r${{ steps.meta.outputs.ksu_ver }}.zip"
          ( cd AK3 && zip -r9 "../$ZIP_NAME" . -x "*.git*" )
          echo "ZIP_PATH=$PWD/$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: Sultan-zumapro-KSU-Next-SuSFS
          path: ${{ env.ZIP_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true
      - name: Tag and Release
        env:
          GH_TOKEN: ${{ github.token }}
          KSU_VER: ${{ needs.build.outputs.ksu_ver }}
        run: |
          DATE=$(date +"%Y.%m.%d")
          MAX_REV=$(git tag -l "${DATE}-r*" | sed "s/${DATE}-r//" | sort -n | tail -n1)
          REV=$(( ${MAX_REV:-0} + 1 ))
          TAG="${DATE}-r${REV}"
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          
          ZIP_FILE=$(find ./artifacts -name "*.zip" -type f | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found!"
            exit 1
          fi
          
          gh release create "$TAG" "$ZIP_FILE" \
            --title "Sultan zumapro Kernel — $TAG" \
            --notes "
            ### Build Information
            | Component | Details |
            | :--- | :--- |
            | **Kernel Base** | Sultan (16.0.0) |
            | **KernelSU** | [KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next) + SuSFS |
            | **KSU Ver** | \`r$KSU_VER\` |
            | **Compiler** | GCC 14.2.rel1 |
            | **Features** | BBR, IPSet, XFRM, TPROXY, Cgroup BPF |
            
            > Built for Pixel 9 (zumapro)."
