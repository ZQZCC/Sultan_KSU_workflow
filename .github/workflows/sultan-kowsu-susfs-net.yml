name: Build Sultan + KowSU + SUSFS + Net

on:
  workflow_dispatch:
    

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Setup Build Environment
        run: |
          set -e
          echo "CPU cores: $(nproc)"
          
          
          sudo apt-get update -qq
          sudo apt-get install -y libelf-dev pahole aria2 build-essential \
            libmpc-dev libmpfr-dev libgmp-dev bc bison flex libssl-dev libfdt-dev

          TOOLCHAIN_DIR="${{ github.workspace }}/toolchains"
          mkdir -p "$TOOLCHAIN_DIR"

          echo "Downloading ARM GNU Toolchain..."
          curl -fsSL "https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz" -o "$TOOLCHAIN_DIR/arm64.tar.xz"
          tar -xf "$TOOLCHAIN_DIR/arm64.tar.xz" -C "$TOOLCHAIN_DIR/"
          ARM64_DIR=$(find "$TOOLCHAIN_DIR" -maxdepth 1 -type d -name "arm-gnu-toolchain-*-aarch64-none-linux-gnu" | head -1)
          echo "ARM64_TOOLCHAIN=${ARM64_DIR}/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV

          curl -fsSL "https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-linux-gnueabihf.tar.xz" -o "$TOOLCHAIN_DIR/arm32.tar.xz"
          tar -xf "$TOOLCHAIN_DIR/arm32.tar.xz" -C "$TOOLCHAIN_DIR/"
          ARM32_DIR=$(find "$TOOLCHAIN_DIR" -maxdepth 1 -type d -name "arm-gnu-toolchain-*-arm-none-linux-gnueabihf" | head -1)
          echo "ARM32_TOOLCHAIN=${ARM32_DIR}/bin/arm-none-linux-gnueabihf-" >> $GITHUB_ENV

      - name: Sync Sources
        run: |
          cd "${{ github.workspace }}"
          mkdir -p kernel_workspace && cd kernel_workspace 
          mkdir -p common 
          
          git clone --depth=1 https://github.com/ZQZCC/android_kernel_google_tensynos -b 16.0.0-sultan common
    
          git clone --depth=1 https://github.com/yapixel/kernel_patches kernel_patches
          git clone --branch="gki-android14-6.1" "https://gitlab.com/simonpunk/susfs4ksu" susfs4ksu

      - name: Unname Patch
        run: |
          cd kernel_workspace/common
          patch -p1 < ../kernel_patches/sultan/60_scripts_mkcompile_h.patch
          patch -p1 < ../kernel_patches/sultan/61_scripts_setlocalversion.patch
          patch -p1 < ../kernel_patches/sultan/62_init_Makefile.patch

          patch -p1 < ../kernel_patches/sultan/selinux_hide.patch 
          
      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          rm -rf KernelSU drivers/kernelsu
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU

         
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

         
          echo 'ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Makefile
          
         
          sed -i 's/ksu_flush_icache((uintptr_t)dst, (uintptr_t)dst + len);/(void)ksu_flush_icache((uintptr_t)dst, (uintptr_t)dst + len);/' drivers/kernelsu/hook/arm64/patch_memory.c

      - name: Setup SuSFS
        run: |
          cd "${{ github.workspace }}/kernel_workspace/common"
          cp ../susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true

          patch -p1 < ../kernel_patches/kowsu/namespace_susfs_fix.patch
          
          cd KernelSU
          patch -p1 --forward < ../../kernel_patches/kowsu/10_enable_susfs_for_ksu.patch || true

      - name: Build Kernel
        run: |
          cd "${{ github.workspace }}/kernel_workspace/common"
          
          # 修复 GCC 15 兼容性项
          sed -i 's/-Wno-error=uninitialized-const-pointer//g' Makefile || true
          # 全局压制 unused-value，双重保险
          sed -i 's/^KBUILD_CFLAGS   +=/KBUILD_CFLAGS   += -Wno-unused-value -Wno-unused-variable /' Makefile

          export ARCH=arm64
          export CROSS_COMPILE="${ARM64_TOOLCHAIN}"
          export CROSS_COMPILE_COMPAT="${ARM32_TOOLCHAIN}"
          export HOSTCC=gcc

          MAKE_JOBS="${{ inputs.make_jobs }}"
          [ "$MAKE_JOBS" = "auto" ] && MAKE_JOBS=$(nproc)

          make O=out ARCH=$ARCH CROSS_COMPILE="$CROSS_COMPILE" HOSTCC="$HOSTCC" gki_defconfig

          cat >> out/.config <<'EOF'
           # --- Core System & FS ---
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=21
          
          # --- Pillar 1: atp4pixel / Advanced Networking ---
          CONFIG_NETFILTER_ADVANCED=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_MULTIPLE_TABLES=y
          CONFIG_IPV6_MULTIPLE_TABLES=y
          # --- Pillar 2: Google VPN (XFRM) Coexistence ---
          CONFIG_XFRM_ALGO=y
          CONFIG_INET_IPCOMP=y
          CONFIG_INET_XFRM_TUNNEL=y
          CONFIG_INET_ESP=y
          CONFIG_XFRM_USER=y
          CONFIG_XFRM_SUB_POLICY=y
          CONFIG_INET_XFRM_MODE_TUNNEL=y
          CONFIG_XFRM_STATISTICS=y
          # --- Pillar 3: IPSet Full Suite ---
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          # --- Pillar 4: TCP Congestion & BBR ---
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=n
          CONFIG_TCP_CONG_HTCP=n
          CONFIG_DEFAULT_BBR=y
          
          # --- Pillar 5: xxKSU (Hookless / LSM) ---
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y

          CONFIG_SECURITY_NETWORK=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_BPF=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_INOTIFY_USER=y
          
          # --- Pillar 5: SUSFS  ---
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
        
          EOF

          make O=out ARCH=$ARCH CROSS_COMPILE="$CROSS_COMPILE" HOSTCC="$HOSTCC" olddefconfig
          [ "${{ inputs.force_clean_build }}" = "true" ] && make O=out ARCH=$ARCH CROSS_COMPILE="$CROSS_COMPILE" HOSTCC="$HOSTCC" clean
          
          # 禁用导致 pahole 错误的 BTF 调试信息
          sed -i 's/CONFIG_DEBUG_INFO_BTF=y/CONFIG_DEBUG_INFO_BTF=n/' out/.config
          
          make -j$MAKE_JOBS O=out ARCH=$ARCH CROSS_COMPILE="$CROSS_COMPILE" HOSTCC="$HOSTCC" Image

      - name: Package Kernel
        run: |
          cd "${{ github.workspace }}/kernel_workspace/common"
          KERNEL_VERSION=$(grep "^VERSION" Makefile | cut -d' ' -f3).$(grep "^PATCHLEVEL" Makefile | cut -d' ' -f3).$(grep "^SUBLEVEL" Makefile | cut -d' ' -f3)
          
          cd "${{ github.workspace }}"
          git clone --depth=1 "https://github.com/TheWildJames/AnyKernel3" b sultan-zumapro AnyKernel3
          
          cp kernel_workspace/common/out/arch/arm64/boot/Image AnyKernel3/
          # 采用更具弹性的查找方式处理 DTB
          find kernel_workspace/common/out/ -name "dtb" -exec cp {} AnyKernel3/ \; 2>/dev/null || true

          cd AnyKernel3 && rm -rf .git .github
          ZIP_NAME="${KERNEL_VERSION}-kowsu-susfs-build-${{ github.run_number }}.zip"
          zip -r9 "../$ZIP_NAME" .
          echo "KERNEL_ZIP=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-kowsu
          path: ${{ env.KERNEL_ZIP }}

      - name: Publish Release
        if: inputs.create_release
        run: |
          TAG="build-${{ github.run_number }}"
          NOTES="KowSU + SuSFS | GCC 15.2 | $(date -u '+%Y-%m-%d %H:%M UTC')"
          gh release create "$TAG" "${{ env.KERNEL_ZIP }}" --title "$TAG" --notes "$NOTES" --repo "${{ github.repository }}" || \
          gh release upload "$TAG" "${{ env.KERNEL_ZIP }}" --repo "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
