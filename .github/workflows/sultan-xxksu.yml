name: Build Sultan + xxKSU

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  ANYKERNEL_REPO: https://github.com/TheWildJames/AnyKernel3.git
  PATCHES_REPO: https://github.com/yapixel/kernel_patches
  SCRIPTS_REPO: https://github.com/TheSillyOk/sh
  KSU_REPO: backslashxx/KernelSU
  KSU_BRANCH: master
  GCC_VERSION: "15.2.0"

jobs:
  build:
    name: Build zumapro Kernel
    runs-on: ubuntu-latest
    outputs:
      ksu_ver: ${{ steps.meta.outputs.ksu_ver }}
      s_tag: ${{ steps.meta.outputs.s_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GCC (Dynamic Toolchain)
        run: |
          # Construct URL dynamically from GCC_VERSION
          BASE_URL="https://kernel.org/pub/tools/crosstool/files/bin/x86_64/${{ env.GCC_VERSION }}"
          ARCHIVE="x86_64-gcc-${{ env.GCC_VERSION }}-nolibc-aarch64-linux.tar.gz"
          
          echo "[+] Downloading GCC ${{ env.GCC_VERSION }}..."
          wget -q "${BASE_URL}/${ARCHIVE}" -O gcc.tar.gz
          tar -xf gcc.tar.gz
          
          # Set toolchain path dynamically
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-${{ env.GCC_VERSION }}-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth=1 https://github.com/kerneltoast/android_kernel_google_tensynos -b 16.0.0-sultan sultan
          git clone --depth=1 "${{ env.ANYKERNEL_REPO }}" -b sultan-zumapro AK3
          git clone --depth=1 "${{ env.PATCHES_REPO }}" kernel_patches
          git clone --depth=1 "${{ env.SCRIPTS_REPO }}" sh

      - name: Metadata
        id: meta
        run: |
          S_TAG=$(git -C sultan tag --sort=-committerdate | head -n1 || echo "latest")
          K_VER=$(./sh/get_ksuver.sh "backslashxx" "KernelSU" "${{ env.KSU_BRANCH }}" || echo "unknown")
          echo "ksu_ver=$K_VER" >> "$GITHUB_OUTPUT"
          echo "s_tag=$S_TAG" >> "$GITHUB_OUTPUT"
          
          G_VER=$(${{ env.TOOLCHAIN_PATH }}gcc --version | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
     

      - name: KSU & Patches
        working-directory: sultan
        run: |
          curl -LSs "https://raw.githubusercontent.com/${{ env.KSU_REPO }}/${{ env.KSU_BRANCH }}/kernel/setup.sh" | bash -s -- "${{ env.KSU_BRANCH }}"
          patch -p1 < ../kernel_patches/sultan/60_scripts_mkcompile_h.patch
          patch -p1 < ../kernel_patches/sultan/61_scripts_setlocalversion.patch
          patch -p1 < ../kernel_patches/sultan/62_init_Makefile.patch

          patch -p1 < ../kernel_patches/sultan/selinux_hide.patch  

      - name: Global Defconfig Analysis
        working-directory: sultan
        run: |
          echo "=== Scanning All Relevant Defconfigs ==="
          TARGET_DEFS=("zumapro_defconfig")
          CHECK_FLAGS=("CONFIG_NETFILTER_ADVANCED" "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE" "CONFIG_KSU")
          for def in "${TARGET_DEFS[@]}"; do
            CONF_PATH="arch/arm64/configs/$def"
            echo "[*] Checking $def..."
            for flag in "${CHECK_FLAGS[@]}"; do
              grep "$flag" "$CONF_PATH" || echo "  - $flag: missing"
            done
          done

      - name: Inject Configuration (Fortress Deep Unlock)
        working-directory: sultan
        env:
          CROSS_COMPILE: ${{ env.GCC_PATH }}
          CC: ${{ env.GCC_PATH }}gcc
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" zumapro_defconfig
          
          cat >> out/.config <<EOF
          # --- Core System & FS ---
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=21
          
          # --- Pillar 1: atp4pixel / Advanced Networking ---
          CONFIG_NETFILTER_ADVANCED=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_MULTIPLE_TABLES=y
          CONFIG_IPV6_MULTIPLE_TABLES=y
          # --- Pillar 2: Google VPN (XFRM) Coexistence ---
          CONFIG_XFRM_ALGO=y
          CONFIG_INET_IPCOMP=y
          CONFIG_INET_XFRM_TUNNEL=y
          CONFIG_INET_ESP=y
          CONFIG_XFRM_USER=y
          CONFIG_XFRM_SUB_POLICY=y
          CONFIG_INET_XFRM_MODE_TUNNEL=y
          CONFIG_XFRM_STATISTICS=y
          # --- Pillar 3: IPSet Full Suite ---
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          # --- Pillar 4: TCP Congestion & BBR ---
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=n
          CONFIG_TCP_CONG_HTCP=n
          CONFIG_DEFAULT_BBR=y
          # --- Pillar 5: xxKSU (Hookless / LSM) ---
          CONFIG_KSU=y
          CONFIG_KSU_EXTRAS=y
          CONFIG_KSU_ALLOWLIST_WORKAROUND=n
          CONFIG_KSU_DEBUG=n
          CONFIG_KSU_KPROBES_HOOK=n
          CONFIG_KSU_TAMPER_SYSCALL_TABLE=y
          CONFIG_KSU_LSM_SECURITY_HOOKS=y
          CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y
          CONFIG_SECURITY_NETWORK=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_BPF=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_INOTIFY_USER=y
          EOF
          
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" olddefconfig

      - name: Build Kernel (Production)
        working-directory: sultan
        env:
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
          CROSS_COMPILE: ${{ env.TOOLCHAIN_PATH }}
          CC: ${{ env.TOOLCHAIN_PATH }}gcc
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" LOCALVERSION_AUTO=0 -j"$(nproc --all)"

      - name: Package
        run: |
          cp sultan/out/arch/arm64/boot/Image.lz4 AK3/Image.lz4
          cat sultan/out/google-devices/zumapro/dts/*.dtb > AK3/dtb
          ZIP_NAME="Sultan-zumapro-$(date +'%Y%m%d')-xxKSU-r${{ steps.meta.outputs.ksu_ver }}.zip"
          ( cd AK3 && zip -r9 "../$ZIP_NAME" . -x "*.git*" )
          echo "ZIP_PATH=$PWD/$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: Sultan-zumapro
          path: ${{ env.ZIP_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true
      - name: List artifacts (debug)
        run: |
          echo "=== artifacts directory contents ==="
          ls -la ./artifacts/
          echo "=== find zip files ==="
          find ./artifacts -name "*.zip" -type f
      - name: Tag and Release
        env:
          GH_TOKEN: ${{ github.token }}
          KSU_VER: ${{ needs.build.outputs.ksu_ver }}
          S_TAG: ${{ needs.build.outputs.s_tag }}
        run: |
          DATE=$(date +"%Y.%m.%d")
          MAX_REV=$(git tag -l "${DATE}-r*" | sed "s/${DATE}-r//" | sort -n | tail -n1)
          REV=$(( ${MAX_REV:-0} + 1 ))
          TAG="${DATE}-r${REV}"
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          
          # Use find to locate the zip file
          ZIP_FILE=$(find ./artifacts -name "*.zip" -type f | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found!"
            exit 1
          fi
          echo "Found zip file: $ZIP_FILE"
          
          gh release create "$TAG" "$ZIP_FILE" \
            --title "Kernel Build — $TAG" \
            --notes "
            ### 🚀 Build Information
            | Component | Details |
            | :--- | :--- |
            | **Kernel Base** | Sultan ($S_TAG) |
            | **Manager** | [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU) |
            | **xxKSU Ver** | \`r$KSU_VER\` |
            | **Compiler** | GCC $GCC_VER |
            
            ### 🛠️ Networking Features (Fortress)
            - **TCP Congestion:** BBR (v1) + FQ
            - **Routing:** Policy Routing (Table 1066) + IPSet (64k)
            - **Fixes:** ADDRTYPE Match, Google VPN (XFRM), TTL 64 Share
            
            > Built for Pixel 9 (zumapro)."
            
